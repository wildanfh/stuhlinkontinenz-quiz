<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktives Quiz: Stuhlinkontinenz</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background glow elements for premium lighting effects -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <!-- Header -->
        <header class="app-header animate-fade-in">
            <div class="logo-area">
                <svg class="medical-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                <div class="title-meta">
                    <span class="category-badge">Pflegewissenschaft & Praxis</span>
                    <h1>Stuhlinkontinenz</h1>
                </div>
            </div>
        </header>

        <!-- Main Card Section -->
        <main class="quiz-card-container">
            <!-- Quiz Screen -->
            <div id="quiz-screen" class="glass-card main-card">
                <!-- Progress Header -->
                <div class="progress-container">
                    <div class="progress-text">
                        <span id="question-index">Frage 1 von 5</span>
                        <span id="score-counter" class="score-badge">Punkte: 0</span>
                    </div>
                    <div class="progress-bar-wrapper">
                        <div id="progress-bar" class="progress-bar" style="width: 20%;"></div>
                    </div>
                </div>

                <!-- Question Segment -->
                <div class="question-segment">
                    <span id="question-category" class="question-category">Thema: Definition & Schweregrade</span>
                    <h2 id="question-text" class="question-text">Lädt Frage...</h2>
                </div>

                <!-- Options -->
                <div id="options-container" class="options-grid">
                    <!-- Dynamic Options will be loaded here -->
                </div>

                <!-- Explanation Area (Revealed after selecting answer) -->
                <div id="explanation-container" class="explanation-box hidden">
                    <div class="explanation-header">
                        <span id="feedback-icon-wrapper" class="feedback-icon"></span>
                        <h4 id="feedback-title">Erklärung</h4>
                    </div>
                    <p id="explanation-text" class="explanation-body"></p>
                </div>

                <!-- Card Footer (Control Button) -->
                <div class="card-footer">
                    <button id="next-btn" class="btn btn-primary hidden" disabled>
                        <span>Nächste Frage</span>
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Results Screen -->
            <div id="result-screen" class="glass-card main-card hidden">
                <div class="results-header animate-scale-up">
                    <div class="circular-progress-container">
                        <svg class="radial-gauge" viewBox="0 0 36 36">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="circle-progress" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="score-display">
                            <span id="score-percent" class="score-percentage">0%</span>
                            <span id="score-fraction" class="score-fraction">0 von 5 richtig</span>
                        </div>
                    </div>
                    
                    <h2 id="result-badge" class="result-badge">Ausgezeichnet!</h2>
                    <p id="result-message" class="result-message">Lade Auswertung...</p>
                </div>
                <div class="results-breakdown">
                    <div class="breakdown-grid">
                        <div class="breakdown-item">
                            <div class="breakdown-icon doc-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            </div>
                            <div class="breakdown-content">
                                <h4>Pflegekompetenz</h4>
                                <p id="breakdown-nursing">Erfolgreich gelöst</p>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-icon shield-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <div class="breakdown-content">
                                <h4>Hautschutz-Sensibilität</h4>
                                <p id="breakdown-skin">Hervorragende Kenntnisse</p>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="result-actions">
                    <button id="restart-btn" class="btn btn-secondary">
                        <svg class="btn-icon-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                        </svg>
                        <span>Quiz wiederholen</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Web App JS -->
    <script src="app.js"></script>
</body>
</html>
